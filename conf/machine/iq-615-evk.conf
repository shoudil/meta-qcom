#@TYPE: Machine
#@NAME: Qualcomm IQ-615 Evaluation Kit (EVK) based on QCS615
#@DESCRIPTION: Machine configuration for Qualcomm IQ-615 Evaluation Kit (EVK)

require conf/machine/include/qcom-qcs615.inc

MACHINE_FEATURES += "efi pci"

KERNEL_DEVICETREE ?= " \
                      qcom/talos-evk.dtb \
                      qcom/talos-evk-camera-imx577.dtbo \
                      qcom/talos-evk-lvds-auo,g133han01.dtbo \
                      "

# These DTs are not upstreamed and currently exist only in linux-qcom kernels
LINUX_QCOM_KERNEL_DEVICETREE ?= " \
                      qcom/talos-evk-camx.dtbo \
                      "

MACHINE_ESSENTIAL_EXTRA_RRECOMMENDS += " \
    packagegroup-iq-615-evk-firmware \
    packagegroup-iq-615-evk-hexagon-dsp-binaries \
    qairt-sdk-hexagon-v66 \
"

QCOM_BOOT_FILES_SUBDIR = "qcs615"
QCOM_PARTITION_FILES_SUBDIR ?= "partitions/iq-615-evk/emmc"
QCOM_BOOT_FIRMWARE = "firmware-qcom-boot-qcs615"

# Isolate rt cpu
QCOM_RT_CPU        = "7"
QCOM_IRQAFF        = "0-6"
QCOM_RCU_NOCBS     = "7"
QCOM_RCU_EXPEDITED = "1"
QCOM_CPUIDLE_OFF   = "1"
